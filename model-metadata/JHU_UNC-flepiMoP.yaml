license: "mit"
methods: "Continuous-age Bayesian SEIR (age, risk, vaccination, immunity) with a parametric contact kernel and hierarchical Fourier seasonality, fit by SVI in flepiMoP2 to hospitalizations and deaths."
methods_long: "flepiMoP2 is an open-source Bayesian compartmental-modeling pipeline (a JAX/NumPyro reimplementation of flepiMoP). For Round 20 we fit a continuous-age SEIR model with hospitalization and death pathways across 51 US jurisdictions, stratified by age, risk, vaccination status, and an 11-rung immune-history ladder. Continuous age mixing uses a parametric age-age contact kernel (preschool, school, adult, and parent-child components) calibrated to a USA-specific Prem contact matrix and stored as a rank-6 low-rank factorization. Transmission combines a location-hierarchical Fourier R0(t) (annual, semi-annual, and ter-annual harmonics with non-centered partial pooling), a monotone secular trend, and a smooth immune-escape envelope. Inference is via stochastic variational inference with a structured low-rank multivariate-normal guide, warm-started from MAP and a Laplace approximation, and is fit jointly to weekly age-banded hospital admissions (NSSP), all-age state hospitalizations and deaths (NHSN/NCHS), and a whole-US aggregate anchor, with LogNormal-on-rates observation models and first-order autoregressive residual correlation."
model_version: "2026-07-17"
website_url: "https://accidda.github.io/flepimop2/latest/"
team_funding: "The development of this model was supported by from funds from NOA: 6 NU38FT000012-01."
data_inputs: "NHSN weekly hospital admissions, NCHS deaths, NSSP age-specific hospitalizations, US Census population, and SMH-provided vaccination-coverage and scenario specifications."
citation: "This submission was produced with flepiMoP2 (Zenodo: https://doi.org/10.5281/zenodo.19672076) using the op_system model-specification library (v0.1.2; https://github.com/ACCIDDA/op_system, docs: https://accidda.github.io/op_system/). Methodological lineage: Lemaitre, JC., et al. flepiMoP: the evolution of a flexible infectious disease modeling pipeline during the COVID-19 pandemic. Epidemics (2024): 100753."
